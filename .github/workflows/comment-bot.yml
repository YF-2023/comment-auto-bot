name: Automated Comment Bot

on:
  issues:
    types: [opened]

jobs:
  comment-on-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check issue labels and add comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Issue #$ISSUE_NUMBER opened"
          
          # Get issue details to check labels
          ISSUE_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER)
          
          echo "Issue data: $ISSUE_JSON"
          
          # Check labels using jq for proper JSON parsing
          if echo "$ISSUE_JSON" | jq -e '.labels[] | select(.name == "bug")' > /dev/null 2>&1; then
            COMMENT="Thank you. We will fix it"
          elif echo "$ISSUE_JSON" | jq -e '.labels[] | select(.name == "feature")' > /dev/null 2>&1; then
            COMMENT="Thank you, we will consider to include this feature."
          else
            COMMENT="Thank you for your contribution!"
          fi
          
          echo "Adding comment: $COMMENT"
          
          # Add comment to the issue
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments \
            -d "{\"body\":\"$COMMENT\"}"